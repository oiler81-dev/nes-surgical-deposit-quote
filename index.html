<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NES Estimate Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-title">NES Estimate Tool</div>
      <div class="brand-sub">CPT + Provider dropdowns (auto-scraped providers)</div>
    </div>

    <div class="actions">
      <a class="btn" href="admin.html">Admin RCM Dashboard</a>
      <button id="addRowBtn" class="btn">Add Row</button>
      <button id="saveQuoteBtn" class="btn primary">Save Quote</button>
      <button id="clearBtn" class="btn danger">Clear</button>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Quote</h2>

      <div class="grid">
        <label>
          Patient Name
          <input id="patientName" type="text" placeholder="optional" />
        </label>
        <label>
          Date
          <input id="quoteDate" type="date" />
        </label>
        <label>
          Notes
          <input id="quoteNotes" type="text" placeholder="optional" />
        </label>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="width:220px">Provider</th>
              <th style="width:150px">CPT</th>
              <th>Description</th>
              <th style="width:120px">Fee</th>
              <th style="width:90px">Qty</th>
              <th style="width:140px">Line Total</th>
              <th style="width:80px"></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="totals">
        <div class="totals-row">
          <div class="totals-label">Estimated Total</div>
          <div class="totals-value big" id="grandTotal">$0.00</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="history-header">
        <h2>Quote History</h2>
        <div class="actions">
          <button id="refreshHistoryBtn" class="btn">Refresh</button>
          <button id="exportHistoryBtn" class="btn">Export CSV</button>
          <button id="clearHistoryBtn" class="btn danger">Clear History</button>
        </div>
      </div>
      <div id="history" class="history"></div>
    </section>
  </main>

  <footer class="footer">
    <small>Uses API when available. Falls back to browser storage if APIs are missing.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
